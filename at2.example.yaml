# Database configuration
database:
  path: "./at2.db" # Path to SQLite database file

# Web server configuration
web:
  listen_address: ":8080"
  public_url: "http://localhost:8080"
  # jwt_secret_file: "/run/secrets/jwt_secret" # Alternative: Load secret from file
  spaceapi_domains:
    - "space.example.com"
  # IPs/CIDRs of trusted reverse proxies (e.g. Traefik). When set, the real
  # client IP is read from the X-Forwarded-For header instead of the peer IP.
  # trusted_proxies:
  #   - "10.0.0.0/8"

# Tablet / kiosk mode configuration
tablet:
  # Tablets connecting from any of these subnets (CIDRs) are granted a
  # long-lived (1 year) session that may control devices, without OIDC login.
  trusted_subnets:
    - "10.12.20.0/24"

# Phabricator/Phorge Calendar — shown as room reservations on the tablet.
phabricator:
  url: "https://phabricator.example.com"
  api_token: "api-xxxxxxxxxxxxxxxxxxxxxxxxxxxx"
  # api_token_file: "/run/secrets/phabricator_token" # Alternative: load from file

# OIDC Authentication configuration
oidc:
  client_id: "your-client-id"
  client_secret: "secret"
  # client_secret_file: "/run/secrets/oidc_client_secret" # Alternative: Load secret from file
  issuer_url: "https://accounts.google.com"
  extra_scopes:
    - "groups"
  username_claim: "preferred_username"
  membership_expiration_claim: "membership_expiration"
  groups_claim: "groups"
  debug_access_groups:
    - "admin"

# Frigate NVR configuration
frigate:
  url: "http://frigate.example.com"

# MQTT Broker configuration
mqtt:
  broker: "tcp://mqtt.example.com:1883"
  username: "mqtt_user"
  password: "mqtt_password"
  # password_file: "/run/secrets/mqtt_password" # Alternative: Load secret from file

# DHCP lease tracking (optional). When this section is omitted the feature is
# disabled and the /dhcp page shows nothing for logged-in users.
# The backend periodically scrapes the router's DHCP server, enriches each lease
# with switch-port info (wired) or AP/SSID/RSSI (WiFi), and serves the result on
# an authenticated, CIDR-filtered API.
# dhcp:
#   scrape_interval: 1m       # how often to poll the router's lease table
#   offline_threshold: 3m     # absence longer than this marks a device offline
#                             # and restarts its "lease start" on reappearance
#   # prune_after: 2160h      # optional: delete lease rows not seen for this long
#
#   # The DHCP lease source. kind selects the implementation (currently "mikrotik").
#   router:
#     kind: mikrotik
#     address: "10.12.20.1:8728"   # RouterOS binary API (8729 with use_tls)
#     username: "admin"
#     password: "secret"
#     # password_file: "/run/secrets/router_password"
#     # use_tls: true
#
#   # Switches whose MAC-to-port table is read to locate wired devices.
#   wired_sources:
#     - kind: mikrotik_bridge_host
#       name: "core-switch"        # shown as the switch name in the UI
#       address: "10.12.20.2:8728"
#       username: "admin"
#       password: "secret"
#       ignore_interfaces:          # uplink/trunk ports that carry many MACs
#         - "sfp-sfpplus1"
#
#   # Wireless controllers that report AP association, SSID and signal strength.
#   wifi_sources:
#     - kind: unifi
#       name: "unifi"
#       url: "https://10.12.20.5:8443"
#       site: "default"             # controller site id
#       username: "noc@example.com"
#       password: "secret"
#       insecure_skip_verify: true  # self-hosted controllers use self-signed certs
#
#   # Access control: which OIDC groups may see devices in which subnets.
#   access:
#     group_cidrs:
#       infra: ["10.12.0.0/16"]     # the "infra" group sees the whole network
#     default_cidrs:                # authenticated users with no matching group
#       - "10.12.10.0/24"

# Bambu Labs 3D printers (optional). Each printer is monitored over its own local
# MQTT interface (TLS on port 8883, self-signed cert) and exposed as a "printer"
# virtual device whose ID is referenced from a room's entities (see below).
# Its live state is never persisted to the database. Web push notifications can
# be enabled per print from the room's printer popover (finish / failure).
# bambu_printers:
#   - id: "bambu/lab/printer"
#     serial_number: "00M00A0000000000"  # printer serial; topic device/<serial>/report
#     host: "10.12.10.99"
#     port: 8883
#     ftp_port: 990                       # implicit FTPS, used to fetch print thumbnails (default 990)
#     username: "bblp"                    # always "bblp" for Bambu printers
#     password: "ACCESSCODE"              # LAN access code from the printer screen
#     # password_file: "/run/secrets/bambu_access_code"
#     insecure_skip_verify: true          # printer uses a self-signed certificate

# Room definitions
rooms:
  - id: "living_room"
    exclude_from_entrance_tablet: false
    # SIP extension/number to dial to reach this room from the tablet phone page.
    voip_phone_number: "21"
    localized_name:
      en: "Living Room"
      de: "Wohnzimmer"
    cameras:
      - "living_room_cam"
    entities:
      - id: "living_room_light"
        localized_name:
          en: "Main Light"
          de: "Hauptlicht"
        representation: "light"
      # Reference a configured Bambu printer (see bambu_printers above) to show a
      # cube button with a live status popover on this room's card.
      # - id: "bambu/lab/printer"
      #   representation: "printer"

# SpaceAPI configuration
spaceapi:
  space: "Hackerspace Example"
  logo: "https://example.com/logo.png"
  url: "https://example.com"
  location:
    address: "Street 123, City, Country"
    lat: 50.0
    lon: 20.0
    timezone: "Europe/Warsaw"
  contact:
    email: "info@example.com"
    irc: "irc://freenode.net/#example"
    matrix: "#example:matrix.org"

# Branding configuration
branding:
  page_title: "Headquarters - My Space"
  logo_url: "https://example.com/logo.png"
  logo_dark_url: "https://example.com/logo_dark.png"
  logo_alt: "My Space Logo"
  logo_link_url: "https://example.com"
  favicon_url: "https://example.com/favicon.ico"
  footer_name: "My Hackerspace"
  footer_name_link_url: "https://example.com"
